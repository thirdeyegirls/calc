<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Third-Eye 塗装シミュレーター</title>
    <style>
        :root { --primary-color: #32CD32; --bg-color: #1e1e1e; --panel-bg: #000; --card-bg: #2d2d2d; --text-color: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow: hidden; }

        /* 上部固定パネル */
        .header-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 180px;
            background-color: var(--panel-bg); z-index: 1000;
            border-bottom: 3px solid var(--primary-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .price-display { font-family: 'Courier New', monospace; font-size: 50px; font-weight: bold; color: var(--primary-color); line-height: 1; }
        .top-controls { display: flex; gap: 10px; margin-top: 15px; width: 90%; max-width: 400px; }
        .top-btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #555; background: #333; color: white; font-weight: bold; text-align: center; cursor: pointer; font-size: 14px; }
        .top-btn.active { background: var(--primary-color); color: black; border: none; }
        .top-btn.reset { border-color: #ff4b4b; color: #ff4b4b; }

        /* メインスクロールエリア */
        .main-content { position: absolute; top: 180px; bottom: 0; left: 0; width: 100%; overflow-y: scroll; padding: 20px 15px 120px; -webkit-overflow-scrolling: touch; }
        h2 { font-size: 18px; border-left: 4px solid var(--primary-color); padding-left: 10px; margin: 25px 0 15px; color: #fff; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .btn-select { background: #333; border: 1px solid #555; color: white; padding: 15px 5px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .btn-select.active { background: var(--primary-color); color: black; border: none; }

        .counter-row { background: var(--card-bg); padding: 12px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .counter-controls { display: flex; align-items: center; gap: 15px; }
        .btn-count { width: 38px; height: 38px; border-radius: 50%; border: none; background: #444; color: white; font-size: 22px; cursor: pointer; }
        .count-val { font-size: 20px; font-weight: bold; color: var(--primary-color); min-width: 30px; text-align: center; }
        .sub-text { font-size: 11px; color: #aaa; margin-top: 8px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="header-panel">
    <div id="tax-label" style="font-size:12px; color:#888; margin-bottom:5px;">合計金額 (税込)</div>
    <div class="price-display" id="total-price">¥0</div>
    <div class="top-controls">
        <div class="top-btn active" id="tax-btn" onclick="toggleTax()">税込 (10%)</div>
        <div class="top-btn reset" onclick="resetAll()">AC 全消去</div>
    </div>
</div>

<div class="main-content">
    <section>
        <h2>🏁 1. モデル選択</h2>
        <div class="grid-4" id="model-grid"></div>
    </section>

    <section>
        <h2>🛠️ 2. 塗装タイプ</h2>
        <div class="grid-2">
            <div class="btn-select active" id="mode-custom" onclick="setMode('custom')">✨ カスタム</div>
            <div class="btn-select" id="mode-solid" onclick="setMode('solid')">🎨 単色のみ</div>
        </div>
    </section>

    <div id="custom-options">
        <section>
            <h2>🎨 3. 特殊塗装 (色選択)</h2>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <div id="btn-pearl" class="btn-select" onclick="toggleColor('pearl')" style="font-size: 15px;">パールホワイト (+2,000円)</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div id="btn-candy" class="btn-select" onclick="toggleColor('candy')">キャンディ (+2k)</div>
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <div id="btn-flake" class="btn-select" onclick="toggleColor('flake')">フレーク (+4k)</div>
                        <div id="btn-wrap" class="btn-select" onclick="toggleColor('wrap')">ラップ (+4k)</div>
                    </div>
                </div>
            </div>
            <p class="sub-text">※パールは単独選択。<br>※キャンディは重複OK。フレークとラップは同時選択不可。</p>
        </section>

        <section>
            <h2>✍️ 4. デザイン・文字入れ</h2>
            <div id="design-counters"></div>
        </section>

        <section>
            <h2>➖ 5. 最終調整</h2>
            <div class="counter-row">
                <span>金額調整 (±1,000)</span>
                <div class="counter-controls">
                    <button class="btn-count" onclick="updateCount('discount', -1000)">-</button>
                    <div class="count-val" id="val-discount">0</div>
                    <button class="btn-count" onclick="updateCount('discount', 1000)">+</button>
                </div>
            </div>
        </section>
    </div>
</div>

<script>
    const basePrices = { "ストーン": 20000, "グリフォン": 20000, "ベッカー": 22000, "ビリー": 22000, "TFS": 29000, "ジョーカー(F)": 44000, "ジョーカー(XL)": 47000 };
    const solidPrices = { "ストーン": 15000, "グリフォン": 15000, "ベッカー": 17000, "ビリー": 17000, "TFS": 22000, "ジョーカー(F)": 36000, "ジョーカー(XL)": 39000 };
    const designs = [
        {n:"特定デザイン", k:"p_design", p:4000}, {n:"普通デザイン", k:"o_design", p:2000},
        {n:"社内定型/ぼかし", k:"n1", p:2000}, {n:"社内定型/はっきり", k:"n2", p:3000},
        {n:"社内オリ/ぼかし", k:"n3", p:3000}, {n:"社内オリ/はっきり", k:"n4", p:4000},
        {n:"社外フォント", k:"n5", p:5000}, {n:"オリジナルロゴ", k:"n6", p:8000}
    ];

    let state = { model: "ストーン", mode: "custom", taxOn: true, counts: { pearl:0, candy:0, flake:0, wrap:0, p_design:0, o_design:0, n1:0, n2:0, n3:0, n4:0, n5:0, n6:0, discount:0 } };

    function init() {
        const mGrid = document.getElementById('model-grid');
        Object.keys(basePrices).forEach(m => {
            const btn = document.createElement('div');
            btn.className = `btn-select ${state.model === m ? 'active' : ''}`;
            btn.innerText = m;
            btn.onclick = () => { state.model = m; render(); };
            mGrid.appendChild(btn);
        });
        const dBox = document.getElementById('design-counters');
        designs.forEach(d => {
            const row = document.createElement('div');
            row.className = 'counter-row';
            row.innerHTML = `<span>${d.n} (¥${d.p.toLocaleString()})</span>
                             <div class="counter-controls">
                                <button class="btn-count" onclick="updateCount('${d.k}', -1)">-</button>
                                <div class="count-val" id="val-${d.k}">0</div>
                                <button class="btn-count" onclick="updateCount('${d.k}', 1)">+</button>
                             </div>`;
            dBox.appendChild(row);
        });
        render();
    }

    function toggleColor(key) {
        if (key === 'pearl') {
            const curr = state.counts.pearl; resetColors(); state.counts.pearl = curr === 1 ? 0 : 1;
        } else if (key === 'candy') {
            state.counts.pearl = 0; state.counts.candy = state.counts.candy === 1 ? 0 : 1;
        } else if (key === 'flake') {
            state.counts.pearl = 0; state.counts.wrap = 0; state.counts.flake = state.counts.flake === 1 ? 0 : 1;
        } else if (key === 'wrap') {
            state.counts.pearl = 0; state.counts.flake = 0; state.counts.wrap = state.counts.wrap === 1 ? 0 : 1;
        }
        render();
    }

    function resetColors() { state.counts.pearl = 0; state.counts.candy = 0; state.counts.flake = 0; state.counts.wrap = 0; }
    function setMode(m) { state.mode = m; render(); }
    function toggleTax() { state.taxOn = !state.taxOn; render(); }
    function updateCount(key, delta) { state.counts[key] = Math.max(key==='discount'?-900000:0, state.counts[key]+delta); render(); }
    function resetAll() { state.model="ストーン"; state.mode="custom"; Object.keys(state.counts).forEach(k=>state.counts[k]=0); render(); }

    function render() {
        document.querySelectorAll('#model-grid .btn-select').forEach(b => b.classList.toggle('active', b.innerText === state.model));
        document.getElementById('mode-custom').classList.toggle('active', state.mode === 'custom');
        document.getElementById('mode-solid').classList.toggle('active', state.mode === 'solid');
        document.getElementById('custom-options').style.display = state.mode === 'custom' ? 'block' : 'none';
        document.getElementById('tax-btn').classList.toggle('active', state.taxOn);
        document.getElementById('tax-btn').innerText = state.taxOn ? '税込 (10%)' : '税抜表示';
        ['pearl','candy','flake','wrap'].forEach(k => document.getElementById(`btn-${k}`).classList.toggle('active', state.counts[k] === 1));
        Object.keys(state.counts).forEach(k => { const el = document.getElementById(`val-${k}`); if(el) el.innerText = state.counts[k].toLocaleString(); });
        let total = state.mode === 'solid' ? solidPrices[state.model] : basePrices[state.model];
        if(state.mode === 'custom') {
            total += state.counts.pearl*2000 + state.counts.candy*2000 + state.counts.flake*4000 + state.counts.wrap*4000;
            designs.forEach(d => total += state.counts[d.k] * d.p);
            total += state.counts.discount;
        }
        if(state.taxOn) total *= 1.1;
        document.getElementById('total-price').innerText = `¥${Math.floor(total).toLocaleString()}`;
    }
    init();
</script>
</body>
</html>
