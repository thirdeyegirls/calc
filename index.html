<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Third-Eye 塗装シミュレーター</title>
    <style>
        :root {
            --win-bg: #f3f3f3;
            --win-panel-bg: rgba(255, 255, 255, 0.8);
            --win-btn-bg: #ffffff;
            --win-btn-active: #a12c2c;
            --win-text: #000000;
            --win-border: #e1e1e1;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; background-color: var(--win-bg); color: var(--win-text); overflow: hidden; }

        /* 上部固定エリア */
        .header-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 180px;
            background-color: var(--win-panel-bg); z-index: 1000;
            border-bottom: 1px solid var(--win-border);
            display: flex; flex-direction: column; padding: 10px;
        }
        .win-title { font-size: 14px; color: #555; margin-bottom: 5px; font-weight: 500; }
        .price-display-container { flex: 1; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; padding-right: 15px; }
        .tax-label { font-size: 12px; color: #777; }
        .price-display { font-size: 50px; font-weight: 600; }

        .top-controls { display: flex; gap: 8px; width: 100%; height: 45px; margin-top: 10px; }
        .top-btn { flex: 1; border-radius: 4px; border: 1px solid var(--win-border); font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #fff; }
        #tax-btn.active { background-color: var(--win-btn-active); color: #fff; border-color: var(--win-btn-active); }
        .reset-btn { background-color: #a12c2c; color: #fff; border-color: #a12c2c; }

        /* スクロールエリア */
        .main-content { position: absolute; top: 180px; bottom: 0; left: 0; width: 100%; overflow-y: auto; padding: 10px 10px 120px; }
        h2 { font-size: 15px; font-weight: 600; margin: 25px 0 10px 5px; color: #333; border-left: 3px solid #a12c2c; padding-left: 8px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }

        .btn-select {
            background-color: var(--win-btn-bg); border: 1px solid var(--win-border);
            border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer;
            min-height: 55px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-select.active { background-color: var(--win-btn-active); color: #fff; border: none; }
        .btn-select span { font-size: 10px; margin-top: 2px; opacity: 0.8; }

        /* カウンター・調整エリア */
        .counter-row { background-color: #fff; border: 1px solid var(--win-border); padding: 10px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
        .counter-controls { display: flex; align-items: center; gap: 8px; }
        .btn-count { width: 35px; height: 35px; border: 1px solid var(--win-border); background: #f9f9f9; border-radius: 4px; font-size: 18px; }
        .count-val { font-size: 18px; font-weight: 600; min-width: 25px; text-align: center; }

        /* 最終調整UI */
        .adj-container { display: flex; gap: 5px; align-items: center; width: 100%; }
        .adj-type-btn { flex: 1; height: 45px; border: 1px solid var(--win-border); background: #fff; border-radius: 4px; font-weight: bold; }
        .adj-type-btn.active { background: #555; color: #fff; }
        .adj-input { flex: 2; height: 45px; border: 1px solid var(--win-border); border-radius: 4px; text-align: right; padding: 0 10px; font-size: 18px; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>

<div class="header-panel">
    <div class="win-title">標準電卓 / 塗装シミュレーター</div>
    <div class="price-display-container">
        <div id="tax-label" class="tax-label">合計 (税込)</div>
        <div class="price-display" id="total-price">¥0</div>
    </div>
    <div class="top-controls">
        <div class="top-btn active" id="tax-btn" onclick="toggleTax()">税込 (10%)</div>
        <div class="top-btn reset-btn" onclick="resetAll()">AC</div>
    </div>
</div>

<div class="main-content">
    <section>
        <h2>1. モデル選択</h2>
        <div class="grid-4" id="model-grid"></div>
    </section>

    <section>
        <h2>2. 塗装タイプ</h2>
        <div class="grid-2">
            <div class="btn-select active" id="mode-custom" onclick="setMode('custom')">カスタム</div>
            <div class="btn-select" id="mode-solid" onclick="setMode('solid')">単色のみ</div>
        </div>
    </section>

    <div id="custom-options">
        <section>
            <h2>3. 特殊塗装</h2>
            <div style="display: flex; flex-direction: column; gap: 4px;">
                <div id="btn-pearl" class="btn-select" onclick="toggleColor('pearl')" style="min-height: 65px;">パールホワイト<span>+¥2,000</span></div>
                <div class="grid-2">
                    <div id="btn-candy" class="btn-select" onclick="toggleColor('candy')">キャンディ<span>+¥2,000</span></div>
                    <div style="display: grid; gap: 4px;">
                        <div id="btn-flake" class="btn-select" onclick="toggleColor('flake')">フレーク<span>+¥4,000</span></div>
                        <div id="btn-wrap" class="btn-select" onclick="toggleColor('wrap')">ラップ<span>+¥4,000</span></div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h2>4. デザイン・文字入れ</h2>
            <div id="design-counters"></div>
        </section>

        <section>
            <h2>5. 最終調整</h2>
            <div class="adj-container">
                <button id="adj-plus" class="adj-type-btn active" onclick="setAdjType(1)">＋ 加算</button>
                <button id="adj-minus" class="adj-type-btn" onclick="setAdjType(-1)">－ 減算</button>
                <input type="number" id="adj-input" class="adj-input" placeholder="0" oninput="updateAdjValue()" pattern="\[0-9]*" inputmode="numeric">
            </div>
        </section>
    </div>
</div>

<script>
    const basePrices = { "ストーン": 20000, "グリフォン": 20000, "ベッカー": 22000, "ビリー": 22000, "TFS": 29000, "ジョーカーF": 44000, "ジョーカーXL": 47000 };
    const solidPrices = { "ストーン": 15000, "グリフォン": 15000, "ベッカー": 17000, "ビリー": 17000, "TFS": 22000, "ジョーカーF": 36000, "ジョーカーXL": 39000 };
    const designs = [ {n:"特定デザイン", k:"p_design", p:4000}, {n:"普通デザイン", k:"o_design", p:2000}, {n:"社内定型ぼかし", k:"n1", p:2000}, {n:"社内定型はっきり", k:"n2", p:3000}, {n:"社内オリぼかし", k:"n3", p:3000}, {n:"社内オリはっきり", k:"n4", p:4000}, {n:"社外フォント", k:"n5", p:5000}, {n:"オリジナルロゴ", k:"n6", p:8000} ];

    let state = { model: "ストーン", mode: "custom", taxOn: true, adjType: 1, adjValue: 0, counts: { pearl:0, candy:0, flake:0, wrap:0, p_design:0, o_design:0, n1:0, n2:0, n3:0, n4:0, n5:0, n6:0 } };

    function init() {
        const mGrid = document.getElementById('model-grid');
        Object.keys(basePrices).forEach(m => {
            const btn = document.createElement('div');
            btn.className = `btn-select ${state.model === m ? 'active' : ''}`;
            btn.innerHTML = `${m}`;
            btn.onclick = () => { state.model = m; render(); };
            mGrid.appendChild(btn);
        });
        const dBox = document.getElementById('design-counters');
        designs.forEach(d => {
            const row = document.createElement('div');
            row.className = 'counter-row';
            row.innerHTML = `<span>${d.n}<br><small style="color:#888">+¥${d.p.toLocaleString()}</small></span>
                             <div class="counter-controls">
                                <button class="btn-count" onclick="updateCount('${d.k}', -1)">-</button>
                                <div class="count-val" id="val-${d.k}">0</div>
                                <button class="btn-count" onclick="updateCount('${d.k}', 1)">+</button>
                             </div>`;
            dBox.appendChild(row);
        });
        render();
    }

    function toggleColor(key) {
        if (key === 'pearl') { const curr = state.counts.pearl; resetColors(); state.counts.pearl = curr === 1 ? 0 : 1; }
        else if (key === 'candy') { state.counts.pearl = 0; state.counts.candy = state.counts.candy === 1 ? 0 : 1; }
        else if (key === 'flake') { state.counts.pearl = 0; state.counts.wrap = 0; state.counts.flake = state.counts.flake === 1 ? 0 : 1; }
        else if (key === 'wrap') { state.counts.pearl = 0; state.counts.flake = 0; state.counts.wrap = state.counts.wrap === 1 ? 0 : 1; }
        render();
    }
    function resetColors() { state.counts.pearl = 0; state.counts.candy = 0; state.counts.flake = 0; state.counts.wrap = 0; }
    function setMode(m) { state.mode = m; render(); }
    function toggleTax() { state.taxOn = !state.taxOn; render(); }
    function updateCount(key, delta) { state.counts[key] = Math.max(0, state.counts[key] + delta); render(); }
    
    function setAdjType(t) { state.adjType = t; render(); }
    function updateAdjValue() { state.adjValue = Number(document.getElementById('adj-input').value) || 0; render(); }

    function resetAll() {
        state.model="ストーン"; state.mode="custom"; state.adjType=1; state.adjValue=0;
        Object.keys(state.counts).forEach(k=>state.counts[k]=0);
        document.getElementById('adj-input').value = "";
        render();
    }

    function render() {
        document.querySelectorAll('#model-grid .btn-select').forEach(b => b.classList.toggle('active', b.innerText === state.model));
        document.getElementById('mode-custom').classList.toggle('active', state.mode === 'custom');
        document.getElementById('mode-solid').classList.toggle('active', state.mode === 'solid');
        document.getElementById('custom-options').style.display = state.mode === 'custom' ? 'block' : 'none';
        document.getElementById('tax-btn').classList.toggle('active', state.taxOn);
        document.getElementById('tax-label').innerText = state.taxOn ? '合計 (税込)' : '合計 (税抜)';
        
        document.getElementById('adj-plus').classList.toggle('active', state.adjType === 1);
        document.getElementById('adj-minus').classList.toggle('active', state.adjType === -1);

        ['pearl','candy','flake','wrap'].forEach(k => document.getElementById(`btn-${k}`).classList.toggle('active', state.counts[k] === 1));
        Object.keys(state.counts).forEach(k => { const el = document.getElementById(`val-${k}`); if(el) el.innerText = state.counts[k]; });

        let total = (state.mode === 'solid' ? solidPrices[state.model] : basePrices[state.model]);
        if(state.mode === 'custom') {
            total += state.counts.pearl*2000 + state.counts.candy*2000 + state.counts.flake*4000 + state.counts.wrap*4000;
            designs.forEach(d => total += state.counts[d.k] * d.p);
            total += (state.adjType * state.adjValue);
        }
        if(state.taxOn) total *= 1.1;
        document.getElementById('total-price').innerText = `¥${Math.floor(total).toLocaleString()}`;
    }
    init();
</script>
</body>
</html>
